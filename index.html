<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LCHNR Spotify Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --green: #1DB954; --black: #121212; --grey: #181818; --light-grey: #282828; }
        body { background: var(--black); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Дизайн під Spotify */
        .header { padding: 20px; background: linear-gradient(to bottom, #333, var(--black)); }
        .pro-label { background: var(--green); color: black; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; float: right; }
        .search-container { padding: 0 20px; }
        .search-input { background: var(--light-grey); border: none; width: 100%; padding: 14px 20px; border-radius: 30px; color: white; outline: none; box-sizing: border-box; font-size: 16px; border: 1px solid transparent; transition: 0.3s; }
        .search-input:focus { border-color: var(--green); background: #333; }

        /* Список треків */
        .section-title { padding: 20px; font-size: 20px; font-weight: bold; }
        .track-list { padding: 0 15px 100px 15px; }
        .track-item { display: flex; align-items: center; padding: 12px; border-radius: 10px; margin-bottom: 8px; background: rgba(255,255,255,0.03); transition: 0.2s; }
        .track-item:active { background: var(--light-grey); transform: scale(0.98); }
        .track-img { width: 48px; height: 48px; border-radius: 6px; background: #333; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .track-info { flex-grow: 1; }
        .track-info b { display: block; font-size: 15px; margin-bottom: 2px; }
        .track-info span { color: #b3b3b3; font-size: 13px; }
        .controls { display: flex; align-items: center; gap: 15px; }
        .heart-btn { font-size: 20px; color: #555; cursor: pointer; }
        .heart-btn.active { color: var(--green); }
        .play-btn { color: var(--green); font-size: 26px; cursor: pointer; }

        /* Плеєр внизу */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #282828; padding: 12px 20px; border-top: 1px solid #000; display: flex; align-items: center; justify-content: space-between; border-radius: 15px 15px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="header">
    <div class="pro-label">PRO PLAN</div>
    <h2 style="margin: 0;">LCHNR Music</h2>
</div>

<div class="search-container">
    <input type="text" class="search-input" id="searchInput" placeholder="Введи назву треку і тисни Enter...">
</div>

<div class="section-title">Твій плейлист</div>

<div class="track-list" id="trackList">
    <div class="track-item" onclick="sendAction('play:Night Drive - Phonk Killer')">
        <div class="track-img">🏎️</div>
        <div class="track-info">
            <b>Night Drive (JDM Edit)</b>
            <span>Phonk Killer</span>
        </div>
        <div class="controls">
            <div class="heart-btn" onclick="event.stopPropagation(); sendAction('fav:Night Drive')">❤️</div>
            <div class="play-btn">▶️</div>
        </div>
    </div>
</div>

<div class="player-bar">
    <div style="display: flex; align-items: center;">
        <div style="font-size: 13px;">
            <b id="activeTrack">Очікування запиту...</b><br>
            <small style="color: var(--green);">Spotify Engine v8.1</small>
        </div>
    </div>
    <div style="font-size: 22px;">⏭️</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.setText("ЗАКРИТИ").show().onClick(() => tg.close());

    // Обробка пошуку через Enter
    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            let val = this.value.trim();
            if (val) {
                tg.sendData("search:" + val);
            }
        }
    });

    // Універсальна функція відправки даних боту
    function sendAction(data) {
        tg.sendData(data);
    }
</script>

</body>
</html>
</html>
