<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LCHNR Spotify Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --green: #1DB954; --black: #0a0a0a; --grey: #1a1a1a; --card: #222; }
        body { background: var(--black); color: white; font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 0; user-select: none; }
        
        .header { padding: 30px 20px 10px; background: linear-gradient(180deg, #222 0%, var(--black) 100%); }
        .pro-badge { background: var(--green); color: black; padding: 3px 10px; border-radius: 5px; font-size: 11px; font-weight: 800; float: right; letter-spacing: 1px; }

        .search-container { padding: 0 20px; margin-top: 10px; }
        .search-input { background: var(--grey); border: 1px solid #333; width: 100%; padding: 15px 20px; border-radius: 12px; color: white; outline: none; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        .search-input:focus { border-color: var(--green); box-shadow: 0 0 10px rgba(29, 185, 84, 0.2); }

        .section-title { padding: 25px 20px 10px; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        .track-list { padding: 0 15px 120px; }
        .track-item { display: flex; align-items: center; padding: 12px; border-radius: 12px; margin-bottom: 8px; background: var(--card); transition: 0.2s; border: 1px solid transparent; }
        .track-item:active { transform: scale(0.97); background: #2a2a2a; }
        
        .track-img { width: 52px; height: 52px; border-radius: 8px; background: linear-gradient(45deg, #333, #111); margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .track-info { flex-grow: 1; }
        .track-info b { display: block; font-size: 15px; margin-bottom: 3px; }
        .track-info span { color: #888; font-size: 13px; }
        
        .play-icon { color: var(--green); font-size: 24px; }

        .player-footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(20,20,20,0.95); backdrop-filter: blur(10px); padding: 15px 25px; border-top: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
    </style>
</head>
<body>

<div class="header">
    <div class="pro-badge">PRO PLAN</div>
    <h1 style="margin: 0; font-size: 26px;">LCHNR Music</h1>
</div>

<div class="search-container">
    <input type="text" class="search-input" id="searchInput" placeholder="Яку пісню знайти, Бос?">
</div>

<div class="section-title">Твій плейлист</div>

<div class="track-list">
    <div class="track-item" onclick="sendToBot('play:Night Drive - Phonk Killer')">
        <div class="track-img">🏎️</div>
        <div class="track-info">
            <b>Night Drive (JDM Edit)</b>
            <span>Phonk Killer</span>
        </div>
        <div class="play-icon">▶️</div>
    </div>
    
    <div class="track-item" onclick="sendToBot('play:Madison Beer - Reckless')">
        <div class="track-img">✨</div>
        <div class="track-info">
            <b>Reckless</b>
            <span>Madison Beer</span>
        </div>
        <div class="play-icon">▶️</div>
    </div>
</div>

<div class="player-footer">
    <div>
        <small style="color: var(--green); font-weight: bold; font-size: 10px;">LCHNR ECOSYSTEM</small><br>
        <span id="activeTrack" style="font-size: 14px;">Ready to drift...</span>
    </div>
    <div style="font-size: 22px;">🎧</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.setText("ЗАКРИТИ ПЛЕЄР").show().onClick(() => tg.close());

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && searchInput.value.trim()) {
            tg.sendData("search:" + searchInput.value.trim());
        }
    });

    function sendToBot(data) {
        tg.sendData(data);
    }
</script>

</body>
</html>
</html>
