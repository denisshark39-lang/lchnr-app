<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LCHNR Music Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --sp-green: #1DB954; --sp-black: #121212; --sp-card: #181818; }
        body { background: var(--sp-black); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .search-container { padding: 0 20px; margin-bottom: 20px; }
        .search-bar { background: #242424; border: none; width: 100%; padding: 12px 20px; border-radius: 25px; color: white; outline: none; }

        /* Таби (Головна, Пошук, JARVIS AI) */
        .tabs { display: flex; justify-content: space-around; padding: 10px 0; border-bottom: 1px solid #222; }
        .tab-item { color: #b3b3b3; font-size: 14px; font-weight: bold; cursor: pointer; }
        .tab-item.active { color: var(--sp-green); border-bottom: 2px solid var(--sp-green); padding-bottom: 5px; }

        /* Список пісень */
        .content { padding: 15px; min-height: 300px; }
        .song-item { display: flex; align-items: center; padding: 10px; border-radius: 8px; margin-bottom: 8px; background: var(--sp-card); }
        .song-img { width: 45px; height: 45px; border-radius: 5px; background: #333; margin-right: 15px; display: flex; align-items: center; justify-content: center; }
        .song-info { flex-grow: 1; }
        .song-info b { display: block; font-size: 14px; }
        .song-info small { color: #b3b3b3; }

        /* ПЛЕЄР (Нижня панель) */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 15px 20px; border-radius: 20px 20px 0 0; }
        .progress-container { width: 100%; height: 4px; background: #444; border-radius: 2px; margin: 10px 0; position: relative; }
        .progress-bar { height: 100%; background: var(--sp-green); width: 45%; border-radius: 2px; }
        .time-info { display: flex; justify-content: space-between; font-size: 10px; color: #b3b3b3; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; font-size: 24px; }
        
        /* Jarvis AI Chat interface */
        #jarvis-chat { display: none; padding: 20px; }
        .ai-msg { background: var(--sp-green); color: black; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin: 0; letter-spacing: -1px;">LCHNR <span style="color:var(--sp-green)">PRO</span></h2>
    <i class="bi bi-person-circle" style="font-size: 22px;"></i>
</div>

<div class="tabs">
    <div class="tab-item active" onclick="showTab('music')">МУЗИКА</div>
    <div class="tab-item" onclick="showTab('ai')">JARVIS AI</div>
    <div class="tab-item" onclick="showTab('fav')">ОБРАНЕ</div>
</div>

<div id="music-tab" class="content">
    <div class="search-container">
        <input type="text" class="search-bar" placeholder="🔍 Що знайти, Бос?">
    </div>
    
    <div id="results">
        <div class="song-item" onclick="playSong('Night Drive', 'Phonk Killer')">
            <div class="song-img"><i class="bi bi-vinyl"></i></div>
            <div class="song-info"><b>Night Drive</b><small>Phonk Killer</small></div>
            <i class="bi bi-play-fill" style="color:var(--sp-green); font-size: 20px;"></i>
        </div>
        <div class="song-item" onclick="playSong('Reckless', 'Madison Beer')">
            <div class="song-img"><i class="bi bi-stars"></i></div>
            <div class="song-info"><b>Reckless</b><small>Madison Beer</small></div>
            <i class="bi bi-play-fill" style="color:var(--sp-green); font-size: 20px;"></i>
        </div>
    </div>
</div>

<div id="ai-tab" class="content" style="display:none">
    <div class="ai-msg">Привіт, Бос! Який настрій? Можу підібрати JDM-мікс або щось для залу.</div>
    <input type="text" class="search-bar" placeholder="Запитай Джарвіса...">
</div>

<div class="player-bar">
    <div style="text-align: center; margin-bottom: 5px;">
        <b id="play-title" style="font-size: 14px;">Madison Beer — Reckless</b>
    </div>
    <div class="progress-container">
        <div class="progress-bar" id="seek-bar"></div>
    </div>
    <div class="time-info">
        <span id="curr-time">1:42</span>
        <span id="total-time">3:23</span>
    </div>
    <div class="controls">
        <i class="bi bi-shuffle" style="font-size: 18px; color: #555;"></i>
        <i class="bi bi-skip-start-fill"></i>
        <i class="bi bi-pause-circle-fill" style="font-size: 45px; color: var(--sp-green);"></i>
        <i class="bi bi-skip-end-fill"></i>
        <i class="bi bi-download" onclick="downloadCurrent()" style="font-size: 18px;"></i>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.backgroundColor = "#121212";

    function showTab(tab) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(tab + '-tab').style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    function playSong(title, artist) {
        document.getElementById('play-title').innerText = artist + " — " + title;
        // Тут ми не викликаємо tg.sendData, щоб додаток НЕ закривався!
        // Ми просто імітуємо роботу плеєра
        animateProgressBar();
    }

    function animateProgressBar() {
        let bar = document.getElementById('seek-bar');
        let width = 0;
        setInterval(() => {
            if (width < 100) {
                width += 0.5;
                bar.style.width = width + "%";
            }
        }, 1000);
    }

    function downloadCurrent() {
        let current = document.getElementById('play-title').innerText;
        // Тільки при натисканні "Скачати" ми відправляємо дані боту і закриваємо вікно
        tg.sendData("dl:" + current);
    }
</script>

</body>
</html>
