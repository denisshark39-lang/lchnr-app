<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LCHNR Spotify Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --green: #1DB954; --black: #121212; --grey: #181818; --light-grey: #282828; }
        body { background: var(--black); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Header */
        .header { padding: 20px; background: linear-gradient(to bottom, #333, var(--black)); }
        .pro-label { background: var(--green); color: black; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; float: right; }

        /* Search */
        .search-container { padding: 0 20px; }
        .search-input { background: var(--light-grey); border: none; width: 100%; padding: 12px 15px; border-radius: 25px; color: white; outline: none; box-sizing: border-box; font-size: 16px; }

        /* Track List */
        .section-title { padding: 20px; font-size: 22px; font-weight: bold; }
        .track-list { padding: 0 15px 100px 15px; }
        .track-item { display: flex; align-items: center; padding: 10px; border-radius: 8px; margin-bottom: 5px; transition: 0.2s; }
        .track-item:active { background: var(--light-grey); }
        .track-img { width: 50px; height: 50px; border-radius: 4px; background: #333; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .track-info { flex-grow: 1; }
        .track-info b { display: block; font-size: 16px; margin-bottom: 2px; }
        .track-info span { color: #b3b3b3; font-size: 14px; }
        .heart-btn { font-size: 20px; margin-right: 15px; color: #b3b3b3; }
        .heart-btn.active { color: var(--green); }
        .play-btn { color: var(--green); font-size: 28px; }

        /* Bottom Player Bar */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #282828; padding: 10px 20px; border-top: 1px solid #000; display: flex; align-items: center; justify-content: space-between; border-radius: 15px 15px 0 0; }
        .nav-tabs { position: fixed; bottom: 65px; left: 0; right: 0; display: flex; justify-content: space-around; background: rgba(18,18,18,0.9); padding: 10px 0; border-top: 0.5px solid #333; }
        .nav-item { color: #b3b3b3; font-size: 12px; text-align: center; text-decoration: none; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

<div class="header">
    <div class="pro-label">PRO PLAN</div>
    <h2 style="margin: 0;">LCHNR Music</h2>
</div>

<div class="search-container">
    <input type="text" class="search-input" id="searchInput" placeholder="Шукати пісні, JDM мікси...">
</div>

<div class="section-title">Твій плейлист</div>

<div class="track-list" id="trackList">
    <div class="track-item" onclick="playTrack('Night Drive - Phonk Killer')">
        <div class="track-img">🏎️</div>
        <div class="track-info">
            <b>Night Drive (JDM Edit)</b>
            <span>Phonk Killer</span>
        </div>
        <div class="heart-btn" onclick="toggleHeart(event, this)">❤️</div>
        <div class="play-btn">▶️</div>
    </div>
</div>

<div class="nav-tabs">
    <div class="nav-item active">🏠<br>Головна</div>
    <div class="nav-item">🔍<br>Пошук</div>
    <div class="nav-item">📚<br>Бібліотека</div>
</div>

<div class="player-bar">
    <div style="display: flex; align-items: center;">
        <div style="font-size: 14px;">
            <b id="currentTrack">Не вибрано</b><br>
            <small style="color: #b3b3b3;">LCHNR Stream</small>
        </div>
    </div>
    <div style="font-size: 24px;">⏭️</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Пошук при натисканні Enter
    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            let q = this.value;
            if(q) tg.sendData("search:" + q);
        }
    });

    function playTrack(name) {
        document.getElementById('currentTrack').innerText = name;
        // Відправляємо назву боту, щоб він скачав/запустив
        tg.sendData("play:" + name);
    }

    function toggleHeart(event, el) {
        event.stopPropagation(); // щоб не спрацював playTrack
        el.classList.toggle('active');
        let track = el.parentElement.querySelector('.track-info b').innerText;
        tg.sendData("fav:" + track);
    }
</script>

</body>
</html>
